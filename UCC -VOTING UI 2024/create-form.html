<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poll Creator</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    .fade-in {
      animation: fadeIn 0.5s ease-in-out;
    }
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen font-sans">

  <!-- Poll Creation Card -->
  <div class="max-w-md mx-auto bg-white shadow-xl rounded-lg p-8 space-y-6 fade-in" x-data="{ 
      showDescription: false, 
      showImage: false, 
      pollType: 'multiple', 
      multipleChoiceOptions: [''], 
      imagePollOptions: [''] 
    }">

    <!-- Title Field -->
    <div>
      <label for="title" class="block text-lg font-semibold text-gray-800">Poll Title</label>
      <input type="text" id="title" class="mt-2 block w-full px-4 py-3 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter poll title">
    </div>

    <!-- Add Description or Image Buttons -->
    <div class="flex space-x-4">
      <button @click="showDescription = !showDescription" class="text-white bg-blue-800 px-4 py-2 rounded-md focus:outline-none transition ease-in-out duration-200">+ Add Description</button>
      <button @click="showImage = !showImage" class="text-white bg-blue-800 px-4 py-2 rounded-md focus:outline-none transition ease-in-out duration-200">+ Add Image</button>
    </div>

    <!-- Description Field -->
    <div x-show="showDescription" class="mt-3 space-y-3">
      <textarea class="w-full px-4 py-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500" placeholder="Enter description"></textarea>
      <button @click="showDescription = false" class="text-red-600 hover:text-red-800 focus:outline-none transition ease-in-out duration-200">- Remove Description</button>
    </div>

    <!-- Image Field -->
    <div x-show="showImage" class="mt-3 space-y-3">
      <div class="flex items-center space-x-2">
        <input type="file" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
        <input type="text" placeholder="Label" class="w-full px-4 py-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500">
      </div>
      <button @click="showImage = false" class="text-red-600 hover:text-red-800 focus:outline-none transition ease-in-out duration-200">- Remove Image</button>
    </div>

    <!-- Poll Type Selection -->
    <div>
      <label class="block text-lg font-semibold text-gray-800">Poll Type</label>
      <select x-model="pollType" class="mt-2 block w-full px-4 py-3 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="multiple">Multiple Choice</option>
        <option value="image">Image Poll</option>
      </select>
    </div>

    <!-- Candidate Options for Multiple Choice -->
    <div x-show="pollType === 'multiple'" class="mt-6">
      <p class="text-lg font-semibold text-gray-800">Candidate Options</p>
      <template x-for="(option, index) in multipleChoiceOptions" :key="index">
        <div class="flex items-center space-x-2 mt-2">
          <input type="text" placeholder="Candidate name" class="w-full px-4 py-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500">
          <button @click="multipleChoiceOptions.push('')" class="text-blue-600 hover:text-blue-800 focus:outline-none">+</button>
          <button @click="multipleChoiceOptions.splice(index, 1)" class="text-red-600 hover:text-red-800 focus:outline-none" x-show="multipleChoiceOptions.length > 1">-</button>
        </div>
      </template>
    </div>

    <!-- Candidate Options for Image Poll -->
    <div x-show="pollType === 'image'" class="mt-6">
      <p class="text-lg font-semibold text-gray-800">Image Options</p>
      <template x-for="(option, index) in imagePollOptions" :key="index">
        <div class="flex items-center space-x-2 mt-2">
          <input type="file" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
          <input type="text" placeholder="Label" class="w-full px-4 py-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500">
          <button @click="imagePollOptions.push('')" class="text-blue-600 hover:text-blue-800 focus:outline-none">+</button>
          <button @click="imagePollOptions.splice(index, 1)" class="text-red-600 hover:text-red-800 focus:outline-none" x-show="imagePollOptions.length > 1">-</button>
        </div>
      </template>
    </div>

    <!-- Submit Button -->
    <button @click="submitPoll()" class="w-full py-3 px-5 bg-blue-800 text-white rounded-md hover:bg-blue-900 focus:outline-none focus:ring-2 focus:ring-blue-800 transition ease-in-out duration-200">Submit Poll</button>
  </div>

  <script>
    function submitPoll() {
      const title = document.getElementById("title").value;
      if (title) {
        alert(`Poll "${title}" submitted successfully!`);
      } else {
        alert("Please enter a title for the poll.");
      }
    }
  </script>
</body>
</html>
